<!DOCTYPE html>
<html>

<head>
    <title>Update Policy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container mt-5">
        <div class="card shadow p-4">

            <h3 class="mb-4 text-center">Update Policy</h3>

            <form method="POST">

                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">Holder Name</label>
                    <input type="text" name="name" value="{{ agent.name }}" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Phone</label>
                    <input type="text" name="phone" value="{{ agent.phone }}" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" value="{{ policy.email }}" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Policy Number</label>
                    <input type="text" name="policy_number" value="{{ policy.policy_number }}" class="form-control"
                        required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Total Amount</label>
                    <input type="number" name="total_amount" value="{{ policy.total_amount }}" class="form-control"
                        required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Policy Years</label>
                    <input type="number" name="policy_years" value="{{ policy.policy_years }}" class="form-control"
                        required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Start Date</label>
                    <input type="date" name="start_date" value="{{ policy.start_date|date:'Y-m-d' }}"
                        class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Payment Interval</label>
                    <select name="plan_duration" class="form-control">

                        <option value="1" {% if policy.payment_interval==1 %}selected{% endif %}>Monthly</option>
                        <option value="3" {% if policy.payment_interval==3 %}selected{% endif %}>Every 3 Months</option>
                        <option value="6" {% if policy.payment_interval==6 %}selected{% endif %}>Every 6 Months</option>
                        <option value="12" {% if policy.payment_interval==12 %}selected{% endif %}>Yearly</option>

                    </select>
                </div>

                <button type="submit" class="btn btn-warning w-100">Update Policy</button>

            </form>

            <a href="/" class="btn btn-secondary mt-3 w-100">Back</a>

        </div>
    </div>

</body>

</html>
